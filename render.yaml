services:
  - type: worker
    name: prorab-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: mistralai/mistral-7b-instruct:free
      - key: APP_URL
        sync: false
      - key: WEBHOOK_PORT
        value: 8080
      - key: PAID_PLAN_DAYS
        value: 30
    disk:
      name: db
      mountPath: /opt/render/project/src/db
      sizeGB: 1
