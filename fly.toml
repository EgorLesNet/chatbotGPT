app = "prorab-bot"
primary_region = "ams"

[build]

[env]
  WEBHOOK_PORT = "8080"
  OPENROUTER_MODEL = "mistralai/mistral-7b-instruct:free"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "prorab_db"
  destination = "/app/db"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
